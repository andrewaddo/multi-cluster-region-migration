apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: asia-southeast1-docker.pkg.dev/multi-cluster-migration/demo-repo/demo-app:v2
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "10.250.1.3" # Replace with your Cloud SQL IP
        - name: DB_USER
          value: "postgres"
        - name: DB_PASS
          value: "YourSecurePassword123" # Matches the setup_db.sh default
        - name: DB_NAME
          value: "postgres"
        - name: CLUSTER_NAME
          value: "cluster-sg"
        - name: REGION
          value: "asia-southeast1"
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
